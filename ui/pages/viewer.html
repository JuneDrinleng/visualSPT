<link rel="stylesheet" href="css/viewer.css" />
<div class="card">
  <div class="card-header">
    <h1>轨迹静态可视化</h1>
    <div class="upload-section">
      <span id="file-path-display" style="color: #95a5a6; font-size: 0.8rem"
        >未选择文件</span
      >
      <button id="uploadBtn" class="action-btn">
        <span>📂</span> 打开文件
      </button>
    </div>
  </div>

  <div class="viz-layout">
    <div class="viz-left">
      <div id="plot-container">
        <div id="placeholder" class="placeholder-box">
          <div style="font-size: 2rem; opacity: 0.2">📉</div>
          <p>请点击右上角打开数据文件</p>
        </div>
        <div id="loading">🚀 正在渲染...</div>
        <div
          id="error-msg"
          style="color: red; display: none; padding: 20px"
        ></div>
        <img id="plot-image" alt="Trajectory Plot" />
      </div>

      <div
        id="control-panel"
        style="display: none"
        onmousedown="event.stopPropagation()"
      >
        <label style="font-weight: 600; color: #555">ID:</label>
        <span
          id="traj-index-lbl"
          style="
            min-width: 20px;
            text-align: right;
            font-weight: bold;
            color: var(--active-color);
          "
          >0</span
        >
        <span
          id="total-traj-lbl"
          style="font-size: 0.75rem; color: #95a5a6; margin-right: 5px"
          >/ 0</span
        >
        <input type="range" id="traj-slider" min="0" max="100" value="0" />
      </div>
    </div>

    <div class="viz-right">
      <div class="panel-title">绘图参数</div>
      <div class="setting-group">
        <label class="setting-label">比例尺 (Scale)</label>
        <div class="unit-row">
          <span style="font-size: 12px; color: #777">1px =</span>
          <input
            type="number"
            id="scale-input"
            class="form-input"
            value="1"
            step="0.1"
            style="text-align: center"
          />
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">坐标轴单位 (X / Y)</label>
        <div class="unit-row">
          <input
            type="text"
            id="x-unit-input"
            class="form-input"
            placeholder="X"
            value="m"
          />
          <span class="unit-separator">/</span>
          <input
            type="text"
            id="y-unit-input"
            class="form-input"
            placeholder="Y"
            value="m"
          />
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">图表标题 (Title)</label>
        <input
          type="text"
          id="title-input"
          class="form-input"
          placeholder="留空则显示默认ID"
        />
      </div>

      <div class="setting-group">
        <div
          class="unit-row"
          style="justify-content: space-between; margin-bottom: 10px"
        >
          <label class="setting-label" style="margin: 0"
            >显示起终点 & 图例</label
          >
          <label class="switch"
            ><input type="checkbox" id="markers-switch" checked /><span
              class="slider"
            ></span
          ></label>
        </div>
        <div
          class="unit-row"
          style="justify-content: space-between; margin-bottom: 10px"
        >
          <label class="setting-label" style="margin: 0">起点归零 (0,0)</label>
          <label class="switch"
            ><input type="checkbox" id="zero-start-switch" checked /><span
              class="slider"
            ></span
          ></label>
        </div>
        <div
          class="unit-row"
          style="justify-content: space-between; margin-bottom: 10px"
        >
          <label class="setting-label" style="margin: 0">显示标题</label>
          <label class="switch"
            ><input type="checkbox" id="show-title-switch" checked /><span
              class="slider"
            ></span
          ></label>
        </div>
        <div
          class="unit-row"
          style="justify-content: space-between; margin-bottom: 10px"
        >
          <label class="setting-label" style="margin: 0">显示坐标轴标签</label>
          <label class="switch"
            ><input type="checkbox" id="show-axis-labels-switch" checked /><span
              class="slider"
            ></span
          ></label>
        </div>
        <div
          class="unit-row"
          style="justify-content: space-between; margin-bottom: 10px"
        >
          <label class="setting-label" style="margin: 0">显示网格线</label>
          <label class="switch"
            ><input type="checkbox" id="show-grid-switch" checked /><span
              class="slider"
            ></span
          ></label>
        </div>
      </div>

      <div class="action-area">
        <button id="saveBtn" class="btn-save"><span>💾</span> 保存视图</button>
      </div>
    </div>
  </div>
</div>
