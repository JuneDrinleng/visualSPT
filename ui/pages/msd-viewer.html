<link rel="stylesheet" href="css/viewer.css" />
<div class="card">
  <div class="card-header">
    <h1>MSD Visualization</h1>
    <div class="upload-section">
      <span id="file-path-display" style="color: #95a5a6; font-size: 0.8rem"
        >No file selected</span
      >
      <button id="uploadBtn" class="action-btn">
        <i data-lucide="folder-open" class="icon-btn"></i> Open File
      </button>
    </div>
  </div>

  <div class="viz-layout">
    <div class="viz-left">
      <div id="plot-container">
        <div id="placeholder" class="placeholder-box">
          <i
            data-lucide="image"
            style="width: 48px; height: 48px; opacity: 0.15; stroke-width: 1.5"
          ></i>
          <p>Please click the top-right button to open a data file</p>
        </div>
        <div id="loading">
          <i
            data-lucide="loader"
            class="icon-spin"
            style="width: 16px; height: 16px"
          ></i>
          Rendering...
        </div>
        <div
          id="error-msg"
          style="color: red; display: none; padding: 20px"
        ></div>
        <img id="plot-image" alt="Trajectory Plot" />
      </div>

      <div
        id="control-panel"
        style="display: none"
        onmousedown="event.stopPropagation()"
      >
        <label style="font-weight: 600; color: #555">ID:</label>
        <span
          id="traj-index-lbl"
          style="
            min-width: 20px;
            text-align: right;
            font-weight: bold;
            color: var(--active-color);
          "
          >0</span
        >
        <span
          id="total-traj-lbl"
          style="font-size: 0.75rem; color: #95a5a6; margin-right: 5px"
          >/ 0</span
        >
        <input type="range" id="traj-slider" min="0" max="100" value="0" />
      </div>
    </div>

    <div class="viz-right">
      <div class="panel-title">Plot Parameters</div>
      <div class="setting-group">
        <label class="setting-label">Scale</label>
        <div class="unit-row">
          <span style="font-size: 12px; color: #777">1px =</span>
          <input
            type="number"
            id="scale-input"
            class="form-input"
            value="1"
            step="0.1"
            style="text-align: center"
          />
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Axis Unit (X / Y)</label>
        <div class="unit-row">
          <input
            type="text"
            id="x-unit-input"
            class="form-input"
            placeholder="X"
            value="m"
          />
          <span class="unit-separator">/</span>
          <input
            type="text"
            id="y-unit-input"
            class="form-input"
            placeholder="Y"
            value="m"
          />
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Chart Title</label>
        <input
          type="text"
          id="title-input"
          class="form-input"
          placeholder="Leave blank for default ID"
        />
      </div>

      <div class="setting-group">
        <div
          class="unit-row"
          style="justify-content: space-between; margin-bottom: 10px"
        >
          <label class="setting-label" style="margin: 0">Show Legend</label>
          <label class="switch"
            ><input type="checkbox" id="markers-switch" checked /><span
              class="slider"
            ></span
          ></label>
        </div>
        <div
          class="unit-row"
          style="justify-content: space-between; margin-bottom: 10px"
        >
          <label class="setting-label" style="margin: 0">Plot EAMSD</label>
          <label class="switch"
            ><input type="checkbox" id="zero-start-switch" checked /><span
              class="slider"
            ></span
          ></label>
        </div>
        <div
          class="unit-row"
          style="justify-content: space-between; margin-bottom: 10px"
        >
          <label class="setting-label" style="margin: 0">Show Title</label>
          <label class="switch"
            ><input type="checkbox" id="show-title-switch" checked /><span
              class="slider"
            ></span
          ></label>
        </div>
        <div
          class="unit-row"
          style="justify-content: space-between; margin-bottom: 10px"
        >
          <label class="setting-label" style="margin: 0"
            >Show Axis Labels</label
          >
          <label class="switch"
            ><input type="checkbox" id="show-axis-labels-switch" checked /><span
              class="slider"
            ></span
          ></label>
        </div>
        <div
          class="unit-row"
          style="justify-content: space-between; margin-bottom: 10px"
        >
          <label class="setting-label" style="margin: 0">Plot TAMSD</label>
          <label class="switch"
            ><input type="checkbox" id="show-grid-switch" checked /><span
              class="slider"
            ></span
          ></label>
        </div>
      </div>

      <div class="action-area">
        <button id="saveBtn" class="btn-save">
          <i data-lucide="download" class="icon-btn"></i> Save View
        </button>
      </div>
    </div>
  </div>
</div>
