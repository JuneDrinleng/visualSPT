<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrajViz</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* 新增滑块样式 */
      .control-panel {
        display: none; /* 默认隐藏，加载数据后显示 */
        margin-bottom: 15px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 8px;
        border: 1px solid #e9ecef;
      }
      .slider-container {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .slider-label {
        font-weight: bold;
        color: #2c3e50;
        min-width: 120px;
      }
      input[type="range"] {
        flex: 1;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="logo">TrajViz v1.0</div>
      <button class="nav-btn active" data-target="viz-page">
        📍 轨迹可视化
      </button>
      <button class="nav-btn" data-target="stats-page">📊 数据统计</button>
      <button class="nav-btn" data-target="settings-page">⚙️ 系统设置</button>
    </div>

    <div class="main-content">
      <!-- 轨迹可视化页面 -->
      <div id="viz-page" class="page active">
        <div class="card">
          <h1>轨迹可视化</h1>
          <!-- <p>点击下方按钮选择 CSV 或 TXT 文件</p> -->

          <div class="upload-section">
            <button id="uploadBtn" class="action-btn">📂 选择并分析文件</button>
            <span id="file-path-display" style="margin-left: 10px; color: #666"
              >未选择文件</span
            >
          </div>

          <!-- 新增：控制面板（滑块） -->
          <div id="control-panel" class="control-panel">
            <div class="slider-container">
              <span class="slider-label"
                >轨迹 ID: <span id="traj-index-lbl">0</span></span
              >
              <input type="range" id="traj-slider" min="0" value="0" step="1" />
              <span
                id="total-traj-lbl"
                style="color: #999; font-size: 0.9em"
              ></span>
            </div>
          </div>

          <div id="plot-container">
            <div id="placeholder" class="placeholder-box">
              <!-- <div>
                <div style="font-size: 3rem; margin-bottom: 10px">📉</div>
                暂无数据<br />请点击按钮选择文件
              </div> -->
            </div>
            <div id="loading">正在处理...</div>
            <div id="error-msg"></div>
            <img id="plot-image" alt="Trajectory Plot" />
          </div>
        </div>
      </div>

      <!-- 其他页面占位 -->
      <div id="stats-page" class="page">
        <div class="card">
          <h1>数据统计</h1>
          <p>统计模块开发中...</p>
        </div>
      </div>
      <div id="settings-page" class="page">
        <div class="card">
          <h1>系统设置</h1>
          <p>设置模块开发中...</p>
        </div>
      </div>
    </div>

    <script src="../script.js"></script>
  </body>
</html>
