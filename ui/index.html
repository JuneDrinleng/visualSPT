<!doctype html>
<html lang="en" style="background: #f8fafc">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>visualSPT</title>
    <link rel="stylesheet" href="css/base.css" />
    <script src="lucide.min.js"></script>
    <style>
      
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--panel-bg, #f8fafc);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.25s ease-out;
      }
      .loading-overlay.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .loading-spinner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        text-align: center;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e2e8f0;
        border-top-color: var(--active-color, #6366f1);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      .loading-text {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-color, #1e293b);
      }
      .loading-subtext {
        font-size: 11px;
        color: var(--text-secondary, #64748b);
        max-width: 200px;
        line-height: 1.4;
      }
      .loading-progress {
        height: 2px;
        width: 100px;
        background: #e2e8f0;
        border-radius: 1px;
        overflow: hidden;
      }
      .loading-progress-bar {
        height: 100%;
        width: 0;
        background: var(--active-color, #6366f1);
        transition: width 0.3s ease-out;
      }
    </style>
  </head>
  <body style="background: #f8fafc; margin: 0; padding: 0">
    
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Initializing visualSPT</div>
        <div class="loading-subtext" id="loadingSubtext">
          Preparing environment...
        </div>
        <div class="loading-progress">
          <div class="loading-progress-bar"></div>
        </div>
      </div>
    </div>

    <div class="window-frame" style="display: none" id="windowFrame">
      <div class="titlebar pywebview-drag-region">
        <div class="titlebar-left">
          <div class="app-title">visualSPT</div>
        </div>
        <div class="titlebar-right">
          <button id="min-btn" class="title-btn">
            <i data-lucide="minus" class="icon-sm"></i>
          </button>
          <button id="close-btn" class="title-btn close">
            <i data-lucide="x" class="icon-sm"></i>
          </button>
        </div>
      </div>
      <div class="content-row">
        <div class="sidebar">
          <nav>
            <button class="nav-btn active" data-target="page-traj-viewer">
              <i data-lucide="route" class="icon-nav"></i>
              Visualization
            </button>
            <button class="nav-btn" data-target="page-activate-traj">
              <i data-lucide="play-circle" class="icon-nav"></i>
              Animation
            </button>
            <button class="nav-btn" data-target="page-msd-viewer">
              <i data-lucide="bar-chart-3" class="icon-nav"></i> MSD Analysis
            </button>
            <button class="nav-btn" data-target="page-settings">
              <i data-lucide="settings" class="icon-nav"></i> Settings
            </button>
            <button class="nav-btn" data-target="page-others">
              <i data-lucide="trending-up" class="icon-nav"></i> About
            </button>
          </nav>
        </div>
        <div class="main-content">
          <div id="app"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
