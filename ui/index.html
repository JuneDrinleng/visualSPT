<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>visualSPT</title>
    <link rel="stylesheet" href="css/base.css" />
    <script src="lucide.min.js"></script>
    <style>
      /* 快速加载指示器：最小化样式 */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.98);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
        backdrop-filter: blur(2px);
      }
      .loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-spinner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-align: center;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #e2e8f0;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .loading-text {
        font-size: 14px;
        font-weight: 500;
        color: #1e293b;
        margin-bottom: 4px;
      }
      .loading-subtext {
        font-size: 12px;
        color: #64748b;
        max-width: 200px;
        line-height: 1.4;
      }
      .loading-progress {
        margin-top: 8px;
        height: 3px;
        width: 120px;
        background: #e2e8f0;
        border-radius: 2px;
        overflow: hidden;
      }
      .loading-progress-bar {
        height: 100%;
        background: #6366f1;
        animation: progress 2s ease-in-out infinite;
      }
      @keyframes progress {
        0%,
        100% {
          width: 0;
        }
        50% {
          width: 100%;
        }
      }
    </style>
    <script>
      // 尽早显示窗口：在 head 脚本中就尝试，不要等 DOMContentLoaded
      // 这样用户可以更快看到预加载指示器
      (function () {
        let attempts = 0;
        const maxAttempts = 20; // 2 秒内重试

        function tryShow() {
          if (
            window.pywebview &&
            window.pywebview.api &&
            window.pywebview.api.window_show
          ) {
            try {
              window.pywebview.api.window_show();
              console.log("[Head] Window show successful");
              return;
            } catch (e) {
              console.log("[Head] Window show not ready yet");
            }
          }

          if (attempts < maxAttempts) {
            attempts++;
            setTimeout(tryShow, 100);
          }
        }

        tryShow();
      })();
    </script>
  </head>
  <body
    style="
      background: rgba(255, 255, 255, 0.98);
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    "
  >
    <!-- 预加载指示器：显示在 body 背景上，避免白屏 -->
    <div
      id="preloadSpinner"
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-align: center;
      "
    >
      <div
        style="
          width: 48px;
          height: 48px;
          border: 3px solid #e2e8f0;
          border-top-color: #6366f1;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        "
      ></div>
      <div
        style="
          font-size: 14px;
          font-weight: 500;
          color: #1e293b;
          margin-bottom: 4px;
        "
      >
        Initializing visualSPT
      </div>
      <div
        style="
          font-size: 12px;
          color: #64748b;
          max-width: 200px;
          line-height: 1.4;
        "
      >
        Loading libraries and preparing UI...
      </div>
      <div
        style="
          margin-top: 8px;
          height: 3px;
          width: 120px;
          background: #e2e8f0;
          border-radius: 2px;
          overflow: hidden;
        "
      >
        <div
          style="
            height: 100%;
            background: #6366f1;
            animation: progress 2s ease-in-out infinite;
          "
        ></div>
      </div>
    </div>
    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes progress {
        0%,
        100% {
          width: 0;
        }
        50% {
          width: 100%;
        }
      }
    </style>
    <script>
      // 在 DOMContentLoaded 时显示窗口（DOM 完全准备好）
      document.addEventListener("DOMContentLoaded", function () {
        // 移除预加载指示器，显示真实窗口
        var preloader = document.getElementById("preloadSpinner");
        if (preloader) {
          preloader.remove();
        }

        // 显示窗口
        if (window.pywebview && window.pywebview.api) {
          try {
            window.pywebview.api.window_show();
            console.log("[DOMContentLoaded] Window show triggered");
          } catch (e) {
            console.log("[DOMContentLoaded] window_show error:", e);
          }
        }
      });
    </script>
    <!-- 加载指示器，库预加载时显示 -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <div class="loading-text">Initializing visualSPT</div>
        <div class="loading-subtext">Loading libraries and preparing UI...</div>
        <div class="loading-progress">
          <div class="loading-progress-bar"></div>
        </div>
      </div>
    </div>

    <div class="window-frame" style="display: none" id="windowFrame">
      <div class="titlebar pywebview-drag-region">
        <div class="titlebar-left">
          <div class="app-title">visualSPT</div>
        </div>
        <div class="titlebar-right">
          <button id="min-btn" class="title-btn">
            <i data-lucide="minus" class="icon-sm"></i>
          </button>
          <button id="close-btn" class="title-btn close">
            <i data-lucide="x" class="icon-sm"></i>
          </button>
        </div>
      </div>
      <div class="content-row">
        <div class="sidebar">
          <nav>
            <button class="nav-btn active" data-target="page-traj-viewer">
              <i data-lucide="route" class="icon-nav"></i>
              Visualization
            </button>
            <button class="nav-btn" data-target="page-activate-traj">
              <i data-lucide="play-circle" class="icon-nav"></i>
              Animation
            </button>
            <button class="nav-btn" data-target="page-msd-viewer">
              <i data-lucide="bar-chart-3" class="icon-nav"></i> MSD Analysis
            </button>
            <button class="nav-btn" data-target="page-others">
              <i data-lucide="trending-up" class="icon-nav"></i> Others
            </button>
          </nav>
        </div>
        <div class="main-content">
          <div id="app"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
