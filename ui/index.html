<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrajViz Pro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 侧边栏 -->
    <div class="sidebar">
      <div class="logo">TrajViz</div>
      <nav>
        <button class="nav-btn active" data-target="page-viz">
          <span>📍</span> 轨迹可视化
        </button>
        <button class="nav-btn" data-target="page-stats">
          <span>📊</span> 数据统计
        </button>
        <button class="nav-btn" data-target="page-settings">
          <span>⚙️</span> 系统设置
        </button>
      </nav>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
      <!-- 页面 1: 可视化工作台 -->
      <div id="page-viz" class="page active">
        <div class="card">
          <div class="card-header">
            <h1>轨迹分析工作台</h1>
            <div class="upload-section">
              <span
                id="file-path-display"
                style="color: #95a5a6; font-size: 0.8rem"
                >未选择文件</span
              >
              <button id="uploadBtn" class="action-btn">
                <span>📂</span> 打开 CSV
              </button>
            </div>
          </div>

          <div class="viz-layout">
            <!-- 左侧绘图区 -->
            <div class="viz-left">
              <div id="plot-container">
                <div id="placeholder" class="placeholder-box">
                  <div style="font-size: 2rem; opacity: 0.2">📉</div>
                  <p>请点击右上角打开数据文件</p>
                </div>
                <div id="loading">🚀 正在渲染...</div>
                <div
                  id="error-msg"
                  style="color: red; display: none; padding: 20px"
                ></div>
                <!-- 图片 -->
                <img id="plot-image" alt="Trajectory Plot" />
              </div>

              <!-- 底部滑块 -->
              <div id="control-panel" style="display: none">
                <label style="font-weight: 600; color: #555">ID:</label>
                <span
                  id="traj-index-lbl"
                  style="
                    min-width: 20px;
                    text-align: right;
                    font-weight: bold;
                    color: var(--active-color);
                  "
                  >0</span
                >
                <span
                  id="total-traj-lbl"
                  style="font-size: 0.75rem; color: #95a5a6; margin-right: 5px"
                  >/ 0</span
                >

                <input
                  type="range"
                  id="traj-slider"
                  min="0"
                  max="100"
                  value="0"
                />
              </div>
            </div>

            <!-- 右侧设置面板 -->
            <div class="viz-right">
              <div class="panel-title">绘图参数</div>

              <div class="setting-group">
                <label class="setting-label">比例尺 (Scale)</label>
                <div class="unit-row">
                  <span style="font-size: 12px; color: #777">1px =</span>
                  <input
                    type="number"
                    id="scale-input"
                    class="form-input"
                    value="1"
                    step="0.1"
                    style="text-align: center"
                  />
                </div>
              </div>
              <div
                class="setting-group"
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                "
              >
                <label class="setting-label" style="margin: 0"
                  >起点归零 (0,0)</label
                >
                <label class="switch">
                  <input type="checkbox" id="zero-start-switch" checked />
                  <span class="slider"></span>
                </label>
              </div>

              <div class="setting-group">
                <label class="setting-label">坐标轴单位 (X / Y)</label>
                <div class="unit-row">
                  <input
                    type="text"
                    id="x-unit-input"
                    class="form-input"
                    placeholder="X"
                    value="m"
                  />
                  <span class="unit-separator">/</span>
                  <input
                    type="text"
                    id="y-unit-input"
                    class="form-input"
                    placeholder="Y"
                    value="m"
                  />
                </div>
              </div>

              <div class="action-area">
                <button id="saveBtn" class="btn-save">
                  <span>💾</span> 保存视图
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 其他页面 -->
      <div id="page-stats" class="page">
        <div style="padding: 40px; text-align: center; color: #95a5a6">
          <h2>数据统计</h2>
          <p>开发中...</p>
        </div>
      </div>

      <div id="page-settings" class="page">
        <div style="padding: 40px; text-align: center; color: #95a5a6">
          <h2>系统设置</h2>
          <p>开发中...</p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
