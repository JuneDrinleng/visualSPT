<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>visualSPT</title>
    <link rel="stylesheet" href="css/base.css" />
    <script src="lucide.min.js"></script>
  </head>
  <body>
    <div class="window-frame">
      <div class="titlebar pywebview-drag-region">
        <div class="titlebar-left">
          <div class="app-title">visualSPT</div>
        </div>
        <div class="titlebar-right">
          <button id="min-btn" class="title-btn">
            <i data-lucide="minus" class="icon-sm"></i>
          </button>
          <button id="close-btn" class="title-btn close">
            <i data-lucide="x" class="icon-sm"></i>
          </button>
        </div>
      </div>
      <div class="content-row">
        <div class="sidebar">
          <nav>
            <button class="nav-btn active" data-target="page-viz">
              <i data-lucide="route" class="icon-nav"></i> Static Trajectory
              Visualization
            </button>
            <button class="nav-btn" data-target="page-activate-traj">
              <i data-lucide="play-circle" class="icon-nav"></i>
              Trajectory Animation
            </button>
            <button class="nav-btn" data-target="page-tamsd">
              <i data-lucide="bar-chart-3" class="icon-nav"></i> MSD
              Visualization
            </button>
            <button class="nav-btn" data-target="page-others">
              <i data-lucide="trending-up" class="icon-nav"></i> Others
            <button class="nav-btn" data-target="page-others">
              <i data-lucide="trending-up" class="icon-nav"></i> Others
            </button>
          </nav>
        </div>
        <div class="main-content">
          <div id="app"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
