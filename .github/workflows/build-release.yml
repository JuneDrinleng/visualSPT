name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - "version_info.txt"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from version_info.txt
        id: get_version
        shell: python
        run: |
          import re, os
          with open('version_info.txt', 'r', encoding='utf-8') as f:
              content = f.read()
          match = re.search(r"StringStruct\(u'ProductVersion',\s*u'([\d.]+)'\)", content)
          if not match:
              raise SystemExit('Failed to extract version from version_info.txt')
          version = match.group(1)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={version}\n')

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: >
          pyinstaller -F -w --name "visualSPT" --icon "logo.ico"
          --version-file "version_info.txt"
          --hidden-import=server.tool.read_traj_file
          --hidden-import=server.tool.plot_traj
          --hidden-import=server.api.io
          --hidden-import=server.api.plot
          --hidden-import=matplotlib.backends.backend_svg
          --hidden-import=matplotlib.backends.backend_agg
          --hidden-import=numpy
          --hidden-import=pandas
          --hidden-import=pystray
          --hidden-import=pystray._win32
          --hidden-import=PIL
          --hidden-import=PIL.Image
          --add-data "ui;ui"
          --add-data "assets;assets"
          main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/visualSPT.exe

    outputs:
      version: ${{ steps.get_version.outputs.version }}

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Convert SVG to icns
        run: |
          brew install inkscape
          mkdir logo.iconset

          for size in 16 32 64 128 256 512 1024; do
            inkscape assets/logo/icon.svg --export-type=png --export-filename=logo.iconset/icon_${size}x${size}.png -w $size -h $size
          done

          cp logo.iconset/icon_32x32.png  logo.iconset/icon_16x16@2x.png
          cp logo.iconset/icon_64x64.png  logo.iconset/icon_32x32@2x.png
          cp logo.iconset/icon_256x256.png logo.iconset/icon_128x128@2x.png
          cp logo.iconset/icon_512x512.png logo.iconset/icon_256x256@2x.png
          cp logo.iconset/icon_1024x1024.png logo.iconset/icon_512x512@2x.png

          iconutil -c icns logo.iconset -o logo.icns

      - name: Build with PyInstaller
        run: >
          pyinstaller -F -w --name "visualSPT"
          --icon "logo.icns"
          --hidden-import=server.tool.read_traj_file
          --hidden-import=server.tool.plot_traj
          --hidden-import=server.api.io
          --hidden-import=server.api.plot
          --hidden-import=matplotlib.backends.backend_svg
          --hidden-import=matplotlib.backends.backend_agg
          --hidden-import=numpy
          --hidden-import=pandas
          --hidden-import=pystray
          --hidden-import=pystray._darwin
          --hidden-import=PIL
          --hidden-import=PIL.Image
          --add-data "ui:ui"
          --add-data "assets:assets"
          main.py

      - name: Package macOS app
        run: |
          cd dist
          zip -r visualSPT-mac.zip visualSPT.app
          cd ..

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/visualSPT-mac.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-windows.outputs.version }}
          name: visualSPT v${{ needs.build-windows.outputs.version }}
          files: |
            dist/visualSPT.exe
            dist/visualSPT-mac.zip
          generate_release_notes: true

      - name: Update latest tag
        shell: bash
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Update latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "visualSPT latest (v${{ steps.get_version.outputs.version }})"
          files: dist/visualSPT.exe
          body: |
            This is the latest build of visualSPT (v${{ steps.get_version.outputs.version }}).
            This release is automatically updated with each new version.
          prerelease: false
          make_latest: false
