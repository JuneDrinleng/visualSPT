name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - 'version_info.txt'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from version_info.txt
        id: get_version
        shell: python
        run: |
          import re, os
          with open('version_info.txt', 'r', encoding='utf-8') as f:
              content = f.read()
          match = re.search(r"StringStruct\(u'ProductVersion',\s*u'([\d.]+)'\)", content)
          if not match:
              raise SystemExit('Failed to extract version from version_info.txt')
          version = match.group(1)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={version}\n')

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: >
          pyinstaller -F -w --name "visualSPT" --icon "logo.ico"
          --version-file "version_info.txt"
          --hidden-import=server.tool.read_traj_file
          --hidden-import=server.tool.plot_traj
          --hidden-import=server.api.io
          --hidden-import=server.api.plot
          --hidden-import=matplotlib.backends.backend_svg
          --hidden-import=matplotlib.backends.backend_agg
          --hidden-import=numpy
          --hidden-import=pandas
          --hidden-import=pystray
          --hidden-import=pystray._win32
          --hidden-import=PIL
          --hidden-import=PIL.Image
          --add-data "ui;ui"
          --add-data "assets;assets"
          main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/visualSPT.exe

    outputs:
      version: ${{ steps.get_version.outputs.version }}

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Convert icon to icns
        run: |
          mkdir -p logo.iconset
          sips -z 16 16     logo.ico --out logo.iconset/icon_16x16.png      || true
          sips -z 32 32     logo.ico --out logo.iconset/icon_16x16@2x.png   || true
          sips -z 32 32     logo.ico --out logo.iconset/icon_32x32.png      || true
          sips -z 64 64     logo.ico --out logo.iconset/icon_32x32@2x.png   || true
          sips -z 128 128   logo.ico --out logo.iconset/icon_128x128.png    || true
          sips -z 256 256   logo.ico --out logo.iconset/icon_128x128@2x.png || true
          sips -z 256 256   logo.ico --out logo.iconset/icon_256x256.png    || true
          sips -z 512 512   logo.ico --out logo.iconset/icon_256x256@2x.png || true
          sips -z 512 512   logo.ico --out logo.iconset/icon_512x512.png    || true
          sips -z 1024 1024 logo.ico --out logo.iconset/icon_512x512@2x.png || true
          iconutil -c icns logo.iconset -o logo.icns || true

      - name: Build with PyInstaller
        run: >
          pyinstaller -F -w --name "visualSPT"
          --icon "logo.icns"
          --hidden-import=server.tool.read_traj_file
          --hidden-import=server.tool.plot_traj
          --hidden-import=server.api.io
          --hidden-import=server.api.plot
          --hidden-import=matplotlib.backends.backend_svg
          --hidden-import=matplotlib.backends.backend_agg
          --hidden-import=numpy
          --hidden-import=pandas
          --hidden-import=pystray
          --hidden-import=pystray._darwin
          --hidden-import=PIL
          --hidden-import=PIL.Image
          --add-data "ui:ui"
          --add-data "assets:assets"
          main.py

      - name: Create DMG
        run: |
          cd dist
          zip -r visualSPT-mac.zip visualSPT.app
          cd ..

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/visualSPT-mac.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-windows.outputs.version }}
          name: visualSPT v${{ needs.build-windows.outputs.version }}
          files: |
            dist/visualSPT.exe
            dist/visualSPT-mac.zip
          generate_release_notes: true
