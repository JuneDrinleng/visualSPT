name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - "version_info.txt"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from version_info.txt
        id: get_version
        shell: python
        run: |
          import re, os
          with open('version_info.txt', 'r', encoding='utf-8') as f:
              content = f.read()
          match = re.search(r"StringStruct\(u'ProductVersion',\s*u'([\d.]+)'\)", content)
          if not match:
              raise SystemExit('Failed to extract version from version_info.txt')
          version = match.group(1)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={version}\n')

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: >
          pyinstaller -F -w --name "visualSPT" --icon "logo.ico"
          --version-file "version_info.txt"
          --hidden-import=server.tool.read_traj_file
          --hidden-import=server.tool.plot_traj
          --hidden-import=server.api.io
          --hidden-import=server.api.plot
          --hidden-import=matplotlib.backends.backend_svg
          --hidden-import=matplotlib.backends.backend_agg
          --hidden-import=numpy
          --hidden-import=pandas
          --hidden-import=pystray
          --hidden-import=pystray._win32
          --hidden-import=PIL
          --hidden-import=PIL.Image
          --add-data "ui;ui"
          --add-data "assets;assets"
          main.py

      - name: Install NSIS and build installer
        shell: pwsh
        run: |
          choco install nsis -y
          # Refresh PATH so makensis is found in the same step
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" +
                      [System.Environment]::GetEnvironmentVariable("PATH","User")
          & "$env:ProgramFiles(x86)\NSIS\makensis.exe" /DAPPVERSION=${{ steps.get_version.outputs.version }} installer.nsi

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/visualSPT-Setup.exe

    outputs:
      version: ${{ steps.get_version.outputs.version }}

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Convert SVG to icns
        run: |
          brew install inkscape
          mkdir logo.iconset

          for size in 16 32 64 128 256 512 1024; do
            inkscape assets/logo/icon.svg --export-type=png --export-filename=logo.iconset/icon_${size}x${size}.png -w $size -h $size
          done

          cp logo.iconset/icon_32x32.png   logo.iconset/icon_16x16@2x.png
          cp logo.iconset/icon_64x64.png   logo.iconset/icon_32x32@2x.png
          cp logo.iconset/icon_256x256.png logo.iconset/icon_128x128@2x.png
          cp logo.iconset/icon_512x512.png logo.iconset/icon_256x256@2x.png
          cp logo.iconset/icon_1024x1024.png logo.iconset/icon_512x512@2x.png

          iconutil -c icns logo.iconset -o logo.icns

      - name: Build with PyInstaller
        run: >
          pyinstaller -F -w --name "visualSPT"
          --icon "logo.icns"
          --hidden-import=server.tool.read_traj_file
          --hidden-import=server.tool.plot_traj
          --hidden-import=server.api.io
          --hidden-import=server.api.plot
          --hidden-import=matplotlib.backends.backend_svg
          --hidden-import=matplotlib.backends.backend_agg
          --hidden-import=numpy
          --hidden-import=pandas
          --hidden-import=pystray
          --hidden-import=pystray._darwin
          --hidden-import=PIL
          --hidden-import=PIL.Image
          --add-data "ui:ui"
          --add-data "assets:assets"
          main.py

      - name: Package macOS app as pkg installer
        run: |
          pkgbuild \
            --install-location /Applications \
            --component dist/visualSPT.app \
            dist/visualSPT.pkg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/visualSPT.pkg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: dist

      - name: Generate latest.yml
        shell: bash
        env:
          VERSION_TAG: v${{ needs.build-windows.outputs.version }}
          VERSION: ${{ needs.build-windows.outputs.version }}
          PUBLIC_REPO: ${{ secrets.PUBLIC_REPO_NAME }}
        run: |
          set -euo pipefail

          REPO="${PUBLIC_REPO:-$GITHUB_REPOSITORY}"
          WIN_ASSET_PATH="dist/visualSPT-Setup.exe"
          WIN_ASSET_NAME="visualSPT-Setup.exe"
          MAC_ASSET_PATH="dist/visualSPT.pkg"
          MAC_ASSET_NAME="visualSPT.pkg"

          WIN_SHA256=$(sha256sum "$WIN_ASSET_PATH" | awk '{print $1}')
          WIN_FILE_SIZE=$(stat -c%s "$WIN_ASSET_PATH")
          WIN_DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${VERSION_TAG}/${WIN_ASSET_NAME}"

          MAC_SHA256=$(sha256sum "$MAC_ASSET_PATH" | awk '{print $1}')
          MAC_FILE_SIZE=$(stat -c%s "$MAC_ASSET_PATH")
          MAC_DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${VERSION_TAG}/${MAC_ASSET_NAME}"

          cat > latest.yml <<EOF
          version: "${VERSION}"
          files:
            - url: "${WIN_DOWNLOAD_URL}"
              name: "${WIN_ASSET_NAME}"
              size: ${WIN_FILE_SIZE}
              sha256: "${WIN_SHA256}"
              platform: "win32"
            - url: "${MAC_DOWNLOAD_URL}"
              name: "${MAC_ASSET_NAME}"
              size: ${MAC_FILE_SIZE}
              sha256: "${MAC_SHA256}"
              platform: "darwin"
          releaseTag: "${VERSION_TAG}"
          releasePage: "https://github.com/${REPO}/releases/tag/${VERSION_TAG}"
          notes: "Auto-built from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          createdAt: "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          EOF

          echo "Generated latest.yml:"
          cat latest.yml

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-windows.outputs.version }}
          name: visualSPT v${{ needs.build-windows.outputs.version }}
          files: |
            dist/visualSPT-Setup.exe
            dist/visualSPT.pkg
            latest.yml
          generate_release_notes: true
